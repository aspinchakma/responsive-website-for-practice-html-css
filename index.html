<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOGO</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <!-- Header section -->
    <header>
      <div class="common_width">
        <!-- navigation -->
        <nav>
          <h2 class="common_color">LOGO</h2>
          <div>
            <button class="common_button">Sign Up</button>
          </div>
        </nav>

        <!-- hero section -->
        <section class="hero_container common_width">
          <h1>Cool Dark UI Template for Webflow Agencies!</h1>
          <button class="common_button">Stay Focused</button>
        </section>
      </div>
    </header>
    <main>
      <!-- See it in action section -->
      <section class="see_it_in common_width">
        <div class="see_it_in_left">
          <h2>See It in Action</h2>
          <p>
            Explore the live preview and imagine your <br />brand in this bold
            new look.
          </p>
          <button class="common_button">Launch Live Preview</button>
        </div>
        <div class="see_it_in_right">
          <img src="./Assets/wc-big.png" alt="" />
        </div>
      </section>

      <!-- Joined section -->
      <section class="common_width joined">
        <h3>Joined Thousands of Productive Users</h3>
        <div class="joined_container">
          <div>
            <h3>50K</h3>
            <p>Active Users</p>
          </div>
          <div>
            <h3>2M+</h3>
            <p>Focus Sessionss</p>
          </div>
          <div>
            <h3>95%</h3>
            <p>Satisfaction Rate</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
